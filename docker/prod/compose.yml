services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      php-fpm:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ../..:/var/www/html:ro
      - ../../nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - public-build:/var/www/html/public/build:ro
    restart: unless-stopped

  php-fpm: &app
    build:
      context: ../..
      dockerfile: docker/prod/Dockerfile
    env_file: ../../.env.production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage
      - public-build:/var/www/html/public/build
    restart: unless-stopped

  queue-worker:
    <<: *app
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600

  scheduler:
    <<: *app
    command: php artisan schedule:work

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-print_crm}
      MYSQL_USER: ${DB_USERNAME:-print_crm}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set DB_ROOT_PASSWORD}
    volumes:
      - prod-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - prod-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  app-storage:
  public-build:
  prod-mysql-data:
  prod-redis-data:
