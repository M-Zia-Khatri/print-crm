services:
  mysql:
    image: mysql:8.4
    container_name: print-crm-dev-mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-print_crm}
      MYSQL_USER: ${DB_USERNAME:-print_crm}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    volumes:
      - dev-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: print-crm-dev-redis
    command: redis-server --appendonly yes
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - dev-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  dev-mysql-data:
  dev-redis-data:
